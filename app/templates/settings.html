{% extends "base.html" %}
{% block content %}
  <div class="card">
    <div class="section-title"><i class="fa-solid fa-gear"></i> Settings</div>
    <form method="post" class="grid two">
      <div>
        <label>Publish daily limit</label>
        <input name="publish_daily_limit" type="number" value="{{ settings.publish_daily_limit }}" min="1" max="100" />
      </div>
      <div>
        <label>Default image policy</label>
        <select name="image_policy_default">
          {% for option in ["none", "priority", "branded"] %}
            <option value="{{ option }}" {% if settings.image_policy_default == option %}selected{% endif %}>{{ option }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>Gemini API Key</label>
        <input type="password" name="gemini_api_key" value="{{ settings.gemini_api_key }}" placeholder="AIza..." />
        <small class="muted">Get your key from <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a></small>
      </div>
    </form>
  </div>
  
  <div class="card">
    <div class="section-title"><i class="fa-solid fa-search"></i> Source Fetching</div>
    <p class="muted">Auto-discover sources when fetching trends. Requires SERPER_API_KEY env variable.</p>
    <form method="post" class="grid two">
      <div>
        <label>Auto-fetch sources</label>
        <label class="toggle">
          <input type="checkbox" name="auto_fetch_sources" {% if settings.auto_fetch_sources == 'true' %}checked{% endif %} />
          <span class="toggle-slider"></span>
          <span class="toggle-label">Enabled</span>
        </label>
      </div>
      <div>
        <label>Days to look back</label>
        <input type="number" name="source_days_back" value="{{ settings.source_days_back }}" min="1" max="30" />
      </div>
      <div>
        <label>Sources per trend</label>
        <input type="number" name="sources_per_trend" value="{{ settings.sources_per_trend }}" min="1" max="10" />
      </div>
      <div class="full-width">
        <button class="button" type="submit"><i class="fa-solid fa-save"></i> Save All Settings</button>
      </div>
    </form>
  </div>
  
  <style>
    .full-width { grid-column: 1 / -1; }
    small.muted { display: block; margin-top: 4px; }
    
    .toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    .toggle input { display: none; }
    .toggle-slider {
      width: 44px;
      height: 24px;
      background: #d1d5db;
      border-radius: 12px;
      position: relative;
      transition: background 0.2s;
    }
    .toggle-slider::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-slider {
      background: var(--success);
    }
    .toggle input:checked + .toggle-slider::after {
      transform: translateX(20px);
    }
    .toggle-label {
      font-weight: 500;
      color: var(--ink);
    }
  </style>
{% endblock %}
