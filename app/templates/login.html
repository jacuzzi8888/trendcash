<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }} - Naija Trend-to-Cash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="{{ url_for('static', filename='dist/output.css') }}?v=1.0.1" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        width: 1em;
        height: 1em;
        line-height: 1;
        vertical-align: middle;
        overflow: hidden;
        white-space: nowrap;
        letter-spacing: normal;
        text-transform: none;
      }
    </style>
  </head>
  <body class="bg-surface text-on-surface font-['Inter'] min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-black tracking-tighter text-primary">NTC</h1>
        <p class="text-xs uppercase tracking-[0.2em] text-on-surface-variant/60 font-bold mt-1">Growth Editorial</p>
      </div>
      
      <div class="bg-surface-container rounded-2xl p-8 shadow-xl border border-on-surface-variant/10">
        <h2 class="text-xl font-bold mb-6 text-center">Sign In</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="space-y-2 mb-6">
              {% for category, message in messages %}
                <div class="p-3 rounded-lg {% if category == 'error' %}bg-error/10 border border-error/30{% else %}bg-green-500/10 border border-green-500/30{% endif %}">
                  <span class="text-sm {% if category == 'error' %}text-error{% else %}text-green-400{% endif %}">{{ message }}</span>
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}
        
        <form method="post" class="space-y-6">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
          
          <div>
            <label for="username" class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant/60 mb-2">Username</label>
            <input 
              type="text" 
              id="username"
              name="username" 
              required 
              autocomplete="username"
              autofocus
              class="w-full bg-surface-container-highest border-none rounded-lg py-3 px-4 text-sm focus:ring-2 focus:ring-primary/50 outline-none"
              placeholder="Enter your username"
            />
          </div>
          
          <div>
            <label for="password" class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant/60 mb-2">Password</label>
            <input 
              type="password" 
              id="password"
              name="password" 
              required 
              autocomplete="current-password"
              class="w-full bg-surface-container-highest border-none rounded-lg py-3 px-4 text-sm focus:ring-2 focus:ring-primary/50 outline-none"
              placeholder="Enter your password"
            />
          </div>
          
          <div class="flex items-center gap-2">
            <input type="checkbox" id="remember" name="remember" class="w-4 h-4 rounded bg-surface-container-highest border-none text-primary focus:ring-primary/50"/>
            <label for="remember" class="text-sm text-on-surface-variant/60">Remember me</label>
          </div>
          
          <button 
            type="submit" 
            class="w-full bg-gradient-to-br from-primary-container to-primary text-on-primary py-3 rounded-xl font-bold text-sm shadow-lg shadow-primary/10 transition-transform active:scale-95"
          >
            Sign In
          </button>
        </form>
      </div>
      
      <p class="text-center text-xs text-on-surface-variant/40 mt-6">
        Naija Trend-to-Cash &copy; {{ now.year if now is defined else 2024 }}
      </p>
    </div>
  </body>
</html>
