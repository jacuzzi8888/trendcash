{% extends "base.html" %}
{% block page_title %}Change Password{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="mb-6">
    <h1 class="text-2xl font-bold tracking-tight">Change Password</h1>
    <p class="text-on-surface-variant text-sm">Update your account password</p>
  </div>

  <div class="glass-card inner-stroke p-6 rounded-2xl">
    <form method="post" class="space-y-6">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      
      <div>
        <label for="current_password" class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/60 mb-2">Current Password</label>
        <input 
          type="password" 
          id="current_password"
          name="current_password" 
          required 
          autocomplete="current-password"
          class="w-full bg-surface-container-highest border-none rounded-lg py-2.5 px-4 text-sm focus:ring-1 focus:ring-primary/50"
          aria-describedby="current_password_help"
        />
      </div>
      
      <div>
        <label for="new_password" class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/60 mb-2">New Password</label>
        <input 
          type="password" 
          id="new_password"
          name="new_password" 
          required 
          autocomplete="new-password"
          minlength="8"
          class="w-full bg-surface-container-highest border-none rounded-lg py-2.5 px-4 text-sm focus:ring-1 focus:ring-primary/50"
          aria-describedby="new_password_help"
        />
        <p id="new_password_help" class="text-[11px] text-on-surface-variant/40 mt-2">Minimum 8 characters</p>
      </div>
      
      <div>
        <label for="confirm_password" class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/60 mb-2">Confirm New Password</label>
        <input 
          type="password" 
          id="confirm_password"
          name="confirm_password" 
          required 
          autocomplete="new-password"
          minlength="8"
          class="w-full bg-surface-container-highest border-none rounded-lg py-2.5 px-4 text-sm focus:ring-1 focus:ring-primary/50"
        />
      </div>
      
      <div class="flex gap-3">
        <button type="submit" class="bg-gradient-to-br from-primary-container to-primary text-on-primary py-2.5 px-6 rounded-xl font-bold text-sm shadow-lg shadow-primary/10 transition-transform active:scale-95 flex items-center gap-2">
          <span class="material-symbols-outlined text-sm" aria-hidden="true">lock</span>
          Update Password
        </button>
        <a href="{{ url_for('settings') }}" class="py-2.5 px-6 rounded-xl font-bold text-sm text-on-surface-variant hover:bg-surface-container transition-colors">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
