{% extends "base.html" %}
{% block content %}
  <div class="card">
    <div class="section-title">QC Dashboard</div>
    <p class="muted">All checks must pass before approval.</p>
  </div>

  {% if drafts %}
    {% for d in drafts %}
      <div class="card">
        <div class="section-title">{{ d.title }}</div>
        <p class="muted">{{ d.topic }}</p>
        <form method="post" class="grid two">
          <input type="hidden" name="draft_id" value="{{ d.id }}" />
          <div>
            <label>Reviewer</label>
            <input name="reviewer" placeholder="Your name" />
          </div>
          <div>
            <label>&nbsp;</label>
            <div>
              <label><input type="checkbox" name="source_valid" /> Source validity</label>
              <label><input type="checkbox" name="unique_value" /> Unique value</label>
              <label><input type="checkbox" name="advertiser_safety" /> Advertiser safety</label>
              <label><input type="checkbox" name="actionability" /> User actionability</label>
            </div>
          </div>
          <div>
            <button class="button" type="submit">Approve Draft</button>
            <a class="button ghost" href="{{ url_for('edit_draft', draft_id=d.id) }}">Edit Draft</a>
          </div>
        </form>
      </div>
    {% endfor %}
  {% else %}
    <div class="card">
      <p class="muted">No drafts waiting for QC.</p>
    </div>
  {% endif %}
{% endblock %}
